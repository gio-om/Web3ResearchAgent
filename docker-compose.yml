version: "3.9"
services:
  omniroute:
    image: diegosouzapw/omniroute:latest
    restart: unless-stopped
    stop_grace_period: 40s
    ports:
      - "20128:20128"
    environment:
      INITIAL_PASSWORD: "123456"
    volumes:
      - omniroute-data:/app/data

  bot:
    build: ./bot
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    ports:
      - "8080:8080"  # FastAPI для Mini App

  mini-app:
    build: ./mini-app
    ports:
      - "3000:80"   # nginx inside listens on 80
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http http://mini-app:80 --url=warty-lanora-uncoaxable.ngrok-free.dev
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - mini-app
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: web3dd
      POSTGRES_PASSWORD: web3dd_secret
      POSTGRES_DB: web3dd
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web3dd"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  omniroute-data:
